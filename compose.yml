services:
  # --- BASE DE DATOS ---
  db:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - loop-network

  # --- BACKEND (API) ---
  api:
    image: ezemastro/loop-api:latest
    container_name: api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGHOST=db
      - API_PORT=3000
    env_file:
      - .env
    volumes:
      - ./uploads:/uploads
    depends_on:
      - db
    networks:
      - loop-network

  # --- FRONTEND (WEB PRINCIPAL) ---
  web:
    image: ezemastro/loop-web:latest
    container_name: web
    restart: unless-stopped
    networks:
      - loop-network

  # --- PANEL ADMIN ---
  admin:
    image: ezemastro/loop-admin:latest
    container_name: admin
    restart: unless-stopped
    networks:
      - loop-network

  # --- PROXY INVERSO (CADDY) ---
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
      - admin
    networks:
      - loop-network

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: postgres_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    networks:
      - loop-network

networks:
  loop-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
